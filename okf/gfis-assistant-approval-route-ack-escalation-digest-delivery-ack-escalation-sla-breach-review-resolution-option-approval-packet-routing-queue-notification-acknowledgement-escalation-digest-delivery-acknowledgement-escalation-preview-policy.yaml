policy_id: okf.gfis_assistant_approval_route_ack_escalation_digest_delivery_ack_escalation_sla_breach_review_resolution_option_approval_packet_routing_queue_notification_acknowledgement_escalation_digest_delivery_acknowledgement_escalation_preview_policy
version: v1.0
owner: GFIS
status: draft
last_reviewed: "2026-06-20"
purpose: >
  Define local no-write approval acknowledgement digest delivery acknowledgement
  escalation previews derived from DKS-158 GFIS Assistant repair notification
  snooze queue acknowledgement escalation digest delivery acknowledgement
  previews. These previews show candidate escalation owners, escalation
  reasons, blocked escalation counts, boundary references, and next-step
  suggestions only. They do not create escalations, reminders, delivery
  acknowledgements, delivery records, notifications, digest records,
  acknowledgements, read receipts, governance records, lifecycle changes,
  business writes, settlements, or external API calls.

required_fields:
  - escalation_preview_id
  - delivery_acknowledgement_preview_refs
  - tenant_id
  - project_id
  - surface
  - escalation_type
  - escalation_status
  - escalation_decision
  - escalation_scope
  - candidate_escalation_owner_refs
  - escalation_reason_refs
  - blocked_escalation_count
  - boundary_refs
  - source_delivery_acknowledgement_preview_refs
  - escalation_summary_ref
  - lineage_hint_refs
  - reason_refs
  - escalation_note_refs
  - next_step_candidate_refs
  - blocked_actions
  - creates_escalation
  - creates_delivery_acknowledgement
  - creates_delivery
  - creates_notification
  - creates_digest
  - creates_acknowledgement
  - creates_read_receipt
  - creates_reminder
  - creates_escalation_task
  - creates_approval_request
  - creates_approval_decision
  - creates_harness_evidence
  - creates_waes_gate_result
  - creates_kwe_work_item
  - persists_evidence
  - approves_business_write
  - promotes_lifecycle
  - completes_committee_decision
  - no_write

