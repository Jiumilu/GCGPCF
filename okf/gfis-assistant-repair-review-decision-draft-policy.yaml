policy_id: okf.gfis_assistant_repair_review_decision_draft_policy
version: v1.0
owner: GFIS
status: draft
last_reviewed: "2026-06-20"
purpose: >
  Define local dry-run GFIS Assistant repair review decision drafts derived
  from DKS-111 repair intake review packets. Drafts express reviewer notes and
  suggested disposition only. They do not submit or persist evidence, create
  review queue items, create confirmation or decision records, create KWE work
  items, persist WAES gate results, mutate KDS lifecycle, write business
  systems, complete approvals, confirm revenue or scores, or call external APIs.

required_fields:
  - decision_draft_id
  - review_packet_ref
  - intake_ref
  - checklist_ref
  - guidance_packet_ref
  - tenant_id
  - project_id
  - assistant_surface
  - draft_type
  - draft_status
  - suggested_disposition
  - reviewer_note_refs
  - required_repair_refs
  - metadata_ref_bundle
  - evidence_hint_refs
  - blocked_reason_refs
  - blocked_actions
  - allowed_display_actions
  - submits_evidence
  - persists_evidence
  - creates_review_queue_item
  - creates_confirmation_record
  - creates_decision_record
  - creates_gap_record
  - creates_bounty_record
  - creates_kwe_work_item
  - creates_waes_gate_result
  - routes_to_human_queue
  - approves_business_write
  - promotes_lifecycle
  - completes_committee_decision
  - no_write

draft_types:
  - human_action_draft
  - metadata_boundary_note
  - committee_agenda_note
  - freeze_note
  - blocked_hold_note

draft_statuses:
  - draft
  - needs_repair
  - blocked
  - metadata_only

suggested_dispositions:
  - request_more_evidence
  - keep_metadata_only
  - prepare_committee_agenda
  - keep_frozen
  - hold_blocked

allowed_display_actions:
  - show_decision_draft
  - show_reviewer_note
  - show_required_repair
  - show_metadata_boundary
  - show_committee_agenda_note
  - show_freeze_note
  - show_no_write_notice

blocked_actions:
  - submit_evidence
  - persist_evidence
  - create_review_queue_item
  - create_confirmation_record
  - create_decision_record
  - create_kwe_work_item
  - create_gap_record
  - create_bounty_record
  - create_waes_gate_result
  - approve_business_write
  - promote_lifecycle
  - complete_committee_decision

hard_boundaries:
  decision_draft_only: true
  decision_draft_is_not_confirmation: true
  decision_draft_is_not_committee_decision: true
  decision_draft_is_not_decision_record: true
  decision_draft_is_not_waes_result: true
  decision_draft_is_not_business_writeback: true
  suggested_disposition_is_recommendation_only: true
  submits_evidence_must_be_false: true
  persists_evidence_must_be_false: true
  creates_review_queue_item_must_be_false: true
  creates_confirmation_record_must_be_false: true
  creates_decision_record_must_be_false: true
  creates_gap_record_must_be_false: true
  creates_bounty_record_must_be_false: true
  creates_kwe_work_item_must_be_false: true
  creates_waes_gate_result_must_be_false: true
  routes_to_human_queue_must_be_false: true
  approves_business_write_must_be_false: true
  promotes_lifecycle_must_be_false: true
  completes_committee_decision_must_be_false: true

no_write_guards:
  writes_gfis: 0
  writes_gpc: 0
  writes_erp: 0
  writes_mes: 0
  writes_waes_gate_result: 0
  writes_kwe_work_item: 0
  writes_review_queue_item: 0
  writes_confirmation_record: 0
  writes_decision_record: 0
  writes_gap_record: 0
  writes_bounty_record: 0
  writes_kds_lifecycle: 0
  writes_kds_fact: 0
  writes_kds_accepted_fact: 0
  writes_evidence_record: 0
  writes_target_receipt: 0
  writes_committee_decision_completion: 0
  writes_revenue_or_score_confirmation: 0
  writes_quota_transfer: 0
  writes_bounty_settlement: 0
  writes_external_api: 0
