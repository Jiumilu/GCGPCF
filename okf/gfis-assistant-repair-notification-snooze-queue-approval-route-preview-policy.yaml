policy_id: okf.gfis_assistant_repair_notification_snooze_queue_approval_route_preview_policy
version: v1.0
owner: GFIS
status: draft
last_reviewed: "2026-06-20"
purpose: >
  Define local no-write approval route previews derived from DKS-127 GFIS
  Assistant repair notification snooze queue share approval previews. Route
  previews describe candidate approval routing only. They do not create
  approval routes, route steps, approver assignments, approval requests,
  approval decisions, share links, ACL grants, external share permissions,
  publication approvals, governance records, lifecycle changes, business
  writes, settlements, or external API calls.

required_fields:
  - route_preview_id
  - approval_preview_ref
  - share_preview_ref
  - tenant_id
  - project_id
  - surface
  - route_type
  - route_status
  - route_decision
  - route_scope
  - route_step_refs
  - source_approval_preview_refs
  - source_share_preview_refs
  - source_snooze_preview_refs
  - route_summary_ref
  - lineage_hint_refs
  - reason_refs
  - route_note_refs
  - next_step_candidate_refs
  - blocked_actions
  - creates_approval_route
  - creates_route_step
  - assigns_approver
  - creates_approval_request
  - creates_approval_decision
  - creates_share_link
  - creates_acl_grant
  - creates_external_share_permission
  - creates_publication_approval
  - creates_harness_evidence
  - creates_waes_gate_result
  - creates_kwe_work_item
  - persists_evidence
  - approves_business_write
  - promotes_lifecycle
  - completes_committee_decision
  - no_write

route_types:
  - team_route_preview
  - project_route_preview
  - governance_route_preview
  - external_blocked_route_preview
  - committee_route_preview
  - freeze_route_preview

route_statuses:
  - route_preview_only
  - route_contains_blocked_items
  - route_metadata_boundary
  - route_committee_required
  - route_external_blocked
  - route_freeze_required

route_decisions:
  - show_team_route_preview
  - show_project_route_preview
  - show_governance_route_preview
  - show_external_blocked_route_preview
  - show_committee_route_preview
  - show_freeze_route_preview

route_scopes:
  - team_internal
  - project_internal
  - governance_review
  - committee_review
  - external_blocked
  - freeze_review

blocked_actions:
  - create_approval_route
  - create_route_step
  - assign_approver
  - create_approval_request
  - create_approval_decision
  - create_share_link
  - create_acl_grant
  - create_external_share_permission
  - create_publication_approval
  - create_harness_evidence
  - create_waes_gate_result
  - create_kwe_work_item
  - persist_evidence
  - approve_business_write
  - promote_lifecycle
  - complete_committee_decision

hard_boundaries:
  route_preview_only: true
  route_preview_is_not_approval_route: true
  route_preview_is_not_route_step: true
  route_preview_is_not_approver_assignment: true
  route_preview_is_not_approval_request: true
  route_preview_is_not_approval_decision: true
  route_preview_is_not_share_link: true
  route_preview_is_not_acl_grant: true
  route_preview_is_not_external_share_permission: true
  route_preview_is_not_publication_approval: true
  route_preview_is_not_harness_evidence: true
  route_preview_is_not_waes_result: true
  route_preview_is_not_kwe_work_item: true
  route_preview_is_not_lifecycle_change: true
  route_preview_is_not_business_writeback: true
  creates_approval_route_must_be_false: true
  creates_route_step_must_be_false: true
  assigns_approver_must_be_false: true
  creates_approval_request_must_be_false: true
  creates_approval_decision_must_be_false: true
  creates_share_link_must_be_false: true
  creates_acl_grant_must_be_false: true
  creates_external_share_permission_must_be_false: true
  creates_publication_approval_must_be_false: true
  creates_harness_evidence_must_be_false: true
  creates_waes_gate_result_must_be_false: true
  creates_kwe_work_item_must_be_false: true
  persists_evidence_must_be_false: true
  approves_business_write_must_be_false: true
  promotes_lifecycle_must_be_false: true
  completes_committee_decision_must_be_false: true

no_write_guards:
  writes_gfis: 0
  writes_gpc: 0
  writes_erp: 0
  writes_mes: 0
  writes_approval_route: 0
  writes_route_step: 0
  writes_approver_assignment: 0
  writes_approval_request: 0
  writes_approval_decision: 0
  writes_share_link: 0
  writes_acl_grant: 0
  writes_external_share_permission: 0
  writes_publication_approval: 0
  writes_waes_gate_result: 0
  writes_kwe_work_item: 0
  writes_harness_evidence: 0
  writes_kds_lifecycle: 0
  writes_kds_fact: 0
  writes_kds_accepted_fact: 0
  writes_external_api: 0
