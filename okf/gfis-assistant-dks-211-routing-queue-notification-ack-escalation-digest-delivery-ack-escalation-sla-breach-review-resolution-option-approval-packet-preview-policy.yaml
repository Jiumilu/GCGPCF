policy_id: okf.gfis_assistant_dks_211_routing_queue_notification_ack_escalation_digest_delivery_ack_escalation_sla_breach_review_resolution_option_approval_packet_preview_policy
version: v1.0
owner: GFIS
status: draft
last_reviewed: '2026-06-21'
purpose: Define local no-write resolution option approval packet previews derived from DKS-210 resolution option previews. These previews show candidate approvers, approval route, required evidence, approval reasons, blocked approval count, boundary references, and next-step suggestions only. They do not create approval packets, approval requests, approval decisions, committee decisions, freeze actions, governance records, lifecycle changes, business writes, settlements, or external API calls.
