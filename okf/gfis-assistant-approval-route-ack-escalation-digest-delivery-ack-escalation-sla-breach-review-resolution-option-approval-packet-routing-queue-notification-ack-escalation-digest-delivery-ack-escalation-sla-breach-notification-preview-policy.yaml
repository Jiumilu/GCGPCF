policy_id: okf.gfis_assistant_approval_route_ack_escalation_digest_delivery_ack_escalation_sla_breach_review_resolution_option_approval_packet_routing_queue_notification_ack_escalation_digest_delivery_ack_escalation_sla_breach_notification_preview_policy
version: v1.0
owner: GFIS
status: draft
last_reviewed: "2026-06-20"
purpose: >
  Define local no-write notification previews derived from DKS-164 routing
  queue previews. These previews show candidate notification type, channel,
  recipient, priority, blocked notification count, and next-step suggestions
  only. They do not create notifications, notification deliveries, messages,
  inbox items, routing queues, queue items, approval assignments, approval
  locks, approval packets, approval requests, approval decisions, committee
  decisions, freeze actions, governance records, lifecycle changes, business
  writes, settlements, or external API calls.

