policy_id: okf.gfis_assistant_dks_224_routing_queue_notification_ack_escalation_digest_delivery_ack_escalation_sla_breach_review_resolution_option_approval_packet_routing_queue_preview_policy
version: v1.0
owner: GFIS
status: draft
last_reviewed: '2026-06-21'
purpose: Define local no-write routing queue previews derived from DKS-223 approval packet previews. These previews show candidate queue slot, queue status, queue priority, candidate assignee, blocked route count, and next-step suggestions only. They do not create routing queues, queue items, approval assignments, approval locks, approval packets, approval requests, approval decisions, committee decisions, freeze actions, governance records, lifecycle changes, business writes, settlements, or external API calls.
