policy_id: okf.kwe_confirmation_workpack_policy
version: v1.0
owner: KWE
status: draft
purpose: "Define local dry-run contract for KWE confirmation workpack reference integrity."
target_object_types:
  - fact_candidate
  - sop_candidate
  - writeback_candidate
  - contribution_candidate
  - revenue_candidate
required_fields:
  - id
  - tenant_id
  - work_item_id
  - target_object_id
  - target_object_type
  - pool_refs
  - source_refs
  - evidence_refs
  - waes_gate_refs
  - reviewer_type
  - reviewer_refs
  - decision_options
  - required_actions
  - sensitive_handling
  - harness_evidence_refs
  - no_write
reviewer_types:
  - human
  - committee
decision_options:
  - allow_accept
  - request_repair
  - reject
  - escalate_committee
  - freeze
sensitive_handling_modes:
  - none
  - redaction_required
  - metadata_only
  - controlled_original
workpack_results:
  - ready_for_human_review
  - ready_for_committee_review
  - repair_required
  - blocked
integrity_rules:
  work_item_and_target_object_must_cross_reference: true
  source_refs_required: true
  evidence_refs_required: true
  waes_gate_refs_required: true
  metadata_only_cannot_include_raw_content: true
  human_reviewer_cannot_complete_committee_decision: true
  committee_reviewer_requires_trigger_reason: true
  missing_evidence_cannot_have_accept_only_decision: true
  blocked_gate_cannot_be_human_accepted: true
  committee_required_gate_cannot_be_human_accepted: true
  workpack_pass_is_not_fact_confirmation: true
  workpack_pass_is_not_business_writeback: true
no_write_guards:
  writes_kwe_work_item: 0
  writes_kds_fact: 0
  writes_waes_gate_result: 0
  writes_business_system: 0
  writes_revenue_or_score_confirmation: 0
  writes_quota_transfer: 0
  writes_bounty_settlement: 0
  writes_committee_decision_completion: 0
  writes_external_api: 0
