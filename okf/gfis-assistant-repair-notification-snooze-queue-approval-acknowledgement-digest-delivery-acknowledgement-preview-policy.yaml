policy_id: okf.gfis_assistant_repair_notification_snooze_queue_approval_acknowledgement_digest_delivery_acknowledgement_preview_policy
version: v1.0
owner: GFIS
status: draft
last_reviewed: "2026-06-20"
purpose: >
  Define local no-write approval acknowledgement digest delivery acknowledgement
  previews derived from DKS-133 GFIS Assistant repair notification snooze queue
  approval acknowledgement digest delivery previews. These previews show
  candidate acknowledgers, acknowledgement methods, blocked acknowledgement
  counts, boundary references, and next-step suggestions only. They do not
  create delivery acknowledgements, delivery records, notifications, digest
  records, acknowledgements, read receipts, reminders, governance records,
  lifecycle changes, business writes, settlements, or external API calls.

required_fields:
  - delivery_acknowledgement_preview_id
  - delivery_preview_refs
  - tenant_id
  - project_id
  - surface
  - acknowledgement_type
  - acknowledgement_status
  - acknowledgement_decision
  - acknowledgement_scope
  - candidate_acknowledger_refs
  - acknowledgement_method_refs
  - blocked_acknowledgement_count
  - boundary_refs
  - source_delivery_preview_refs
  - acknowledgement_summary_ref
  - lineage_hint_refs
  - reason_refs
  - acknowledgement_note_refs
  - next_step_candidate_refs
  - blocked_actions
  - creates_delivery_acknowledgement
  - creates_delivery
  - creates_notification
  - creates_digest
  - creates_acknowledgement
  - creates_read_receipt
  - creates_reminder
  - creates_escalation_task
  - creates_approval_request
  - creates_approval_decision
  - creates_harness_evidence
  - creates_waes_gate_result
  - creates_kwe_work_item
  - persists_evidence
  - approves_business_write
  - promotes_lifecycle
  - completes_committee_decision
  - no_write

acknowledgement_types:
  - team_delivery_ack_preview
  - project_delivery_ack_preview
  - governance_delivery_ack_preview
  - external_blocked_delivery_ack_preview
  - committee_delivery_ack_preview
  - freeze_delivery_ack_preview

acknowledgement_statuses:
  - acknowledgement_preview_only
  - acknowledgement_at_risk_preview
  - acknowledgement_metadata_boundary
  - acknowledgement_external_blocked
  - acknowledgement_committee_required
  - acknowledgement_freeze_required

acknowledgement_decisions:
  - show_team_delivery_ack_preview
  - show_project_delivery_ack_preview
  - show_governance_delivery_ack_preview
  - show_external_blocked_delivery_ack_preview
  - show_committee_delivery_ack_preview
  - show_freeze_delivery_ack_preview

acknowledgement_scopes:
  - team_internal
  - project_internal
  - governance_review
  - external_blocked
  - committee_review
  - freeze_review

acknowledgement_methods:
  - preview_seen
  - candidate_ack
  - manual_review_candidate
  - committee_review_candidate
  - freeze_review_candidate
  - external_blocked_candidate

blocked_actions:
  - create_delivery_acknowledgement
  - create_delivery
  - create_notification
  - create_digest
  - create_acknowledgement
  - create_read_receipt
  - create_reminder
  - create_escalation_task
  - create_approval_request
  - create_approval_decision
  - create_harness_evidence
  - create_waes_gate_result
  - create_kwe_work_item
  - persist_evidence
  - approve_business_write
  - promote_lifecycle
  - complete_committee_decision

hard_boundaries:
