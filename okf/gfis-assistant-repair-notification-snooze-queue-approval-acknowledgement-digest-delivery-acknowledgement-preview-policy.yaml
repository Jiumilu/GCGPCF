  acknowledgement_preview_is_not_delivery_acknowledgement: true
  acknowledgement_preview_is_not_delivery_record: true
  acknowledgement_preview_is_not_notification: true
  acknowledgement_preview_is_not_digest_record: true
  acknowledgement_preview_is_not_acknowledgement: true
  acknowledgement_preview_is_not_read_receipt: true
  acknowledgement_preview_is_not_reminder: true
  acknowledgement_preview_is_not_escalation_task: true
  acknowledgement_preview_is_not_approval_request: true
  acknowledgement_preview_is_not_approval_decision: true
  acknowledgement_preview_is_not_harness_evidence: true
  acknowledgement_preview_is_not_waes_result: true
  acknowledgement_preview_is_not_kwe_work_item: true
  acknowledgement_preview_is_not_lifecycle_change: true
  acknowledgement_preview_is_not_business_writeback: true
  creates_delivery_acknowledgement_must_be_false: true
  creates_delivery_must_be_false: true
  creates_notification_must_be_false: true
  creates_digest_must_be_false: true
  creates_acknowledgement_must_be_false: true
  creates_read_receipt_must_be_false: true
  creates_reminder_must_be_false: true
  creates_escalation_task_must_be_false: true
  creates_approval_request_must_be_false: true
  creates_approval_decision_must_be_false: true
  creates_harness_evidence_must_be_false: true
  creates_waes_gate_result_must_be_false: true
  creates_kwe_work_item_must_be_false: true
  persists_evidence_must_be_false: true
