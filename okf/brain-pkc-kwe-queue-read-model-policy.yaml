policy_id: okf.brain_pkc_kwe_queue_read_model_policy
version: v1.0
owner: Brain
status: draft
last_reviewed: "2026-06-20"
purpose: >
  Define local dry-run contract for Brain, PKC, and GFIS Assistant KWE queue
  read models. Read models aggregate KWE approval route packets for display
  only. They do not create KWE work items, complete approvals, mutate KDS
  lifecycle, create WAES gate results, write business systems, confirm revenue
  or scores, or call external APIs.

required_fields:
  - view_id
  - surface
  - tenant_id
  - viewer_id
  - project_id
  - scope
  - route_packet_refs
  - visible_route_refs
  - masked_route_refs
  - queue_summary
  - filter
  - visibility
  - display_mode
  - blocked_actions
  - no_write

surfaces:
  - brain
  - pkc
  - gfis_assistant

scopes:
  - kwe_queue_overview
  - my_kwe_tasks
  - gfis_writeback_queue
  - committee_queue
  - blocked_queue

visibility_modes:
  - own_only
  - project_authorized
  - governance_aggregate
  - committee_authorized

display_modes:
  - summary_only
  - queue_detail
  - metadata_only
  - masked_cross_unit

blocked_actions:
  - create_kwe_work_item
  - complete_approval
  - complete_committee_decision
  - approve_gfis_writeback
  - mutate_kds_lifecycle
  - write_waes_gate_result
  - write_business_system
  - call_external_api

hard_boundaries:
  read_model_only: true
  pkc_defaults_to_own_or_authorized_only: true
  gfis_assistant_cannot_complete_approval: true
  brain_cross_unit_detail_requires_governance_or_committee_authorization: true
  masked_cross_unit_must_not_expose_route_ids: true
  queue_view_is_not_work_item_creation: true
  queue_view_is_not_approval_completion: true
  queue_view_is_not_business_writeback: true

no_write_assertions:
  writes_kwe_work_item: 0
  writes_kds_lifecycle: 0
  writes_kds_fact: 0
  writes_kds_accepted_fact: 0
  writes_waes_gate_result: 0
  writes_business_system: 0
  writes_target_receipt: 0
  writes_committee_decision_completion: 0
  writes_revenue_or_score_confirmation: 0
  writes_quota_transfer: 0
  writes_bounty_settlement: 0
  writes_external_api: 0
