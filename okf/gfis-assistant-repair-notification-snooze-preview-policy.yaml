  snooze_preview_is_not_snooze_record: true
  snooze_preview_is_not_scheduled_reminder: true
  snooze_preview_is_not_dismissal_record: true
  snooze_preview_is_not_notification_update: true
  snooze_preview_is_not_notification: true
  snooze_preview_is_not_read_receipt: true
  snooze_preview_is_not_audit_trace_record: true
  snooze_preview_is_not_event_record: true
  snooze_preview_is_not_action_receipt: true
  snooze_preview_is_not_harness_evidence: true
  snooze_preview_is_not_waes_result: true
  snooze_preview_is_not_kwe_work_item: true
  snooze_preview_is_not_lifecycle_change: true
  snooze_preview_is_not_business_writeback: true
  creates_snooze_record_must_be_false: true
  creates_scheduled_reminder_must_be_false: true
  creates_dismissal_record_must_be_false: true
  creates_notification_must_be_false: true
  modifies_notification_must_be_false: true
  creates_read_receipt_must_be_false: true
  creates_audit_trace_record_must_be_false: true
  creates_event_record_must_be_false: true
  creates_action_receipt_must_be_false: true
  creates_harness_evidence_must_be_false: true
  creates_waes_gate_result_must_be_false: true
  creates_kwe_work_item_must_be_false: true
  persists_evidence_must_be_false: true
  approves_business_write_must_be_false: true
