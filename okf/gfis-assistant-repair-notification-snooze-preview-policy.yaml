policy_id: okf.gfis_assistant_repair_notification_snooze_preview_policy
version: v1.0
owner: GFIS
status: draft
last_reviewed: "2026-06-20"
purpose: >
  Define local no-write snooze previews derived from DKS-121 GFIS Assistant
  repair notification dismissal previews. Snooze previews describe what the UI
  may show when a user asks to be reminded later about a notification preview.
  They do not create snooze records, scheduled reminders, dismissal records,
  notifications, read receipts, audit trace records, event records, action
  receipts, Harness evidence, WAES gate results, KWE work items, lifecycle
  changes, business writes, revenue or score confirmations, quota transfers,
  bounty settlements, or external API calls.

required_fields:
  - snooze_preview_id
  - dismissal_preview_ref
  - notification_preview_ref
  - read_receipt_preview_ref
  - audit_trace_ref
  - event_preview_ref
  - action_guard_ref
  - read_model_ref
  - tenant_id
  - project_id
  - surface
  - snooze_type
  - snooze_status
  - snooze_decision
  - snooze_summary_ref
  - lineage_hint_refs
  - reason_refs
  - snooze_note_refs
  - next_step_candidate_refs
  - blocked_actions
  - creates_snooze_record
  - creates_scheduled_reminder
  - creates_dismissal_record
  - creates_notification
  - modifies_notification
  - creates_read_receipt
  - creates_audit_trace_record
  - creates_event_record
  - creates_action_receipt
  - creates_harness_evidence
  - creates_waes_gate_result
  - creates_kwe_work_item
  - persists_evidence
  - approves_business_write
  - promotes_lifecycle
  - completes_committee_decision
  - no_write

snooze_types:
  - snooze_display_notification_preview
  - snooze_repair_notification_preview
  - retain_metadata_boundary_snooze_preview
  - retain_committee_snooze_preview
  - block_freeze_snooze_preview
  - retain_blocked_write_snooze_preview

snooze_statuses:
  - snooze_preview_only
  - deferred_snooze_preview
  - retained_snooze_preview
  - blocked_snooze_preview
  - metadata_boundary_snooze_retained_preview
  - freeze_snooze_blocked_preview

snooze_decisions:
  - show_snooze_preview_only
  - show_repair_snooze_preview
  - show_metadata_snooze_retained_preview
  - show_committee_snooze_retained_preview
  - show_freeze_snooze_blocked_preview
  - show_blocked_write_snooze_retained_preview

blocked_actions:
  - create_snooze_record
  - create_scheduled_reminder
  - create_dismissal_record
  - create_notification
  - modify_notification
  - create_read_receipt
  - create_audit_trace_record
  - create_event_record
  - create_action_receipt
  - create_harness_evidence
  - create_waes_gate_result
  - create_kwe_work_item
  - persist_evidence
  - approve_business_write
  - promote_lifecycle
  - complete_committee_decision

hard_boundaries:
