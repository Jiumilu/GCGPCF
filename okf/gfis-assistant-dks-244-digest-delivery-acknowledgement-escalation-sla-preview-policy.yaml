policy_id: okf.gfis_assistant_dks_244_digest_delivery_acknowledgement_escalation_sla_preview_policy
version: v1.0
owner: GFIS
status: draft
last_reviewed: '2026-06-21'
purpose: Define local no-write acknowledgement escalation SLA previews derived from DKS-243 digest delivery acknowledgement escalation previews. These previews show candidate SLA risk, SLA windows, candidate escalation owners, SLA reasons, required evidence references, blocked SLA escalation count, boundary references, and next-step suggestions only. They do not create SLA timers, escalations, reminders, escalation tasks, delivery acknowledgements, approval requests, approval decisions, governance records, lifecycle changes, business writes, settlements, or external API calls.
