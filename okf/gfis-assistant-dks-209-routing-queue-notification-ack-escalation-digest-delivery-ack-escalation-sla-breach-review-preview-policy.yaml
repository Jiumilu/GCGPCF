policy_id: okf.gfis_assistant_dks_209_routing_queue_notification_ack_escalation_digest_delivery_ack_escalation_sla_breach_review_preview_policy
version: v1.0
owner: GFIS
status: draft
last_reviewed: '2026-06-21'
purpose: Define local no-write SLA breach review previews derived from DKS-208 acknowledgement escalation SLA previews. These previews show candidate reviewers, evidence gaps, breach reasons, breach severity, overdue minutes, blocked review count, boundary references, and next-step suggestions only. They do not create breach records, disputes, committee cases, freeze requests, reminders, approval records, governance records, lifecycle changes, business writes, settlements, or external API calls.
